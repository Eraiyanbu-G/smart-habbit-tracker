<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Life Stats Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="top">

  <div>
    <h2 id="level">Level 1</h2>
    <p id="xp">0 XP</p>
  </div>

  <div>
    🔥 <span id="streak">0</span>
  </div>

  <button id="themeToggle">🌙</button>

  <button id="logoutBtn">
  Logout
</button>

</header>

  <section class="card">
    <h3>Today</h3>

    <form id="dailyForm">
      <input id="sleepInput" type="number" placeholder="Sleep (hours)" required />
      <input id="waterInput" type="number" placeholder="Water (glasses)" required />
      <input id="exerciseInput" type="number" placeholder="Exercise (minutes)" required />
      <button type="submit">Save Today</button>
    </form>
  </section>

  <section class="card">
    <h3>Weekly Summary</h3>
    <p>Avg Sleep: <span id="avgSleep">0</span>h</p>
    <p>Total Water: <span id="totalWater">0</span></p>
    <p>Total Exercise: <span id="totalExercise">0</span> min</p>
    <button id="exportBtn">Export CSV</button>
    <canvas id="sleepChart" height="120"></canvas>
    <canvas id="waterChart" height="120"></canvas>
    <canvas id="exerciseChart" height="120"></canvas>
  </section>

  <section class="card">
    <h3>Health Suggestions</h3>
    <div class="goal-progress">

  <div class="goal-item">
    <p>😴 Sleep Goal</p>
    <div class="progress-bar">
      <div id="sleepProgress"></div>
    </div>
  </div>

  <div class="goal-item">
    <p>💧 Water Goal</p>
    <div class="progress-bar">
      <div id="waterProgress"></div>
    </div>
  </div>

  <div class="goal-item">
    <p>🏃 Exercise Goal</p>
    <div class="progress-bar">
      <div id="exerciseProgress"></div>
    </div>
  </div>

</div>
    <ul id="suggestionsList">
    <li>Great job! No suggestions today.</li>
    </ul>
  </section>

  <section class="card">
    <h3>Achievements</h3>
    <ul id="achievementList">
      <li>No achievements yet</li>
    </ul>
  </section>
  <button id="resetData">Reset All Data</button>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="js_temp/auth.js"></script>
  <script type="module" src="js_temp/app.js"></script>
</body>
</html>
