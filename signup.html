<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

  <div class="auth-card">

    <h1>Create Account</h1>

    <form id="signupForm">

      <input
        type="text"
        id="signupName"
        placeholder="Name"
        required
      >

      <input
        type="email"
        id="signupEmail"
        placeholder="Email"
        required
      >

      <input
        type="password"
        id="signupPassword"
        placeholder="Password"
        required
      >

      <button type="submit">
        Sign Up
      </button>

    </form>

    <p>
      Already have account?
      <a href="index.html">Login</a>
    </p>

  </div>

</div>

<script type="module" src="js_temp/auth.js"></script>

</body>
</html>
